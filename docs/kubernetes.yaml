apiVersion: apps/v1
kind: Deployment
metadata:
  name: stem-detective-backend
  labels:
    app: stem-detective-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stem-detective-backend
  template:
    metadata:
      labels:
        app: stem-detective-backend
    spec:
      containers:
        - name: backend
          image: your-registry/stem-detective-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stem-detective-secrets
                  key: database-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stem-detective-secrets
                  key: openai-api-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stem-detective-secrets
                  key: secret-key
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: stem-detective-backend-service
spec:
  selector:
    app: stem-detective-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stem-detective-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.stemdetective.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stem-detective-backend-service
                port:
                  number: 80
