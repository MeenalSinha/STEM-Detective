services:
  - type: web
    name: stem-detective-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stem-detective-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: stem-detective-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production

  - type: redis
    name: stem-detective-redis
    plan: starter
    region: oregon

databases:
  - name: stem-detective-db
    plan: starter
    region: oregon
    databaseName: stemdetective
    postgresMajorVersion: 15
